<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso | REN EDUCA</title>
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/curso.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/preview-bar.css">
</head>
<body>
    <main class="course-shell">
        <a class="back-link" href="panel-estudiante.html">Volver al panel</a>

        <section class="course-hero">
            <img id="cursoImagen" class="curso-imagen" alt="Imagen del curso">
            <div class="course-copy">
                <p class="eyebrow">Ruta de aprendizaje</p>
                <h1 id="cursoNombre"></h1>
                <p id="cursoDescripcion" class="description"></p>
                <div class="info">
                    <span id="cursoCategoria"></span>
                    <span id="cursoNivel"></span>
                </div>
            </div>
        </section>

        <section class="progress-panel">
            <div>
                <p>Progreso del curso</p>
                <strong id="porcentajeProgreso">0%</strong>
            </div>
            <div class="barra-progreso">
                <div id="barraInterna" class="barra-interna"></div>
            </div>
        </section>

        <section class="modules-section">
            <div class="section-title">
                <h2>Modulos del curso</h2>
                <p>Completa cada modulo para avanzar.</p>
            </div>
            <div id="modulosContainer" class="modules-list"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/tema.js"></script>
    <script src="../js/proteger-estudiante.js"></script>
    <script src="../js/preview-bar.js"></script>
    <script src="../js/curso.js"></script>
</body>
</html>
